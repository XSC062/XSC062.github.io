        <p>你好。</p>
<hr>
<p>周日。家里的网络又坏了。</p>
<p>家里只有我一个人，唯一的通讯设备是坏的，我随便修了一下，坏得更严重了。</p>
<p>台式机是五年前的，播放着那几年特别流行的歌曲。</p>
<p>突然想起，以前的人们没有网络，没有手机，是不是和我现在一样无助呢？应该不是吧。</p>
<p>蓦地想起以前在学力上看到过的一篇文章。在一个下午，作者看见了许久未见的阳光，忽生一念，遂向友人写信。洋洋洒洒，每个字都溶着千万缕说不尽的感情。</p>
<p>写到一半，电话响了，正是那位朋友打来的。草草寒暄几句，望着桌上的信纸，忽地没了兴致。</p>
<p>方便的通信手段，究竟是让人们的交流更便捷了，还是让心灵之间的隔阂更大了？</p>
<hr>
<p>关于「祈愿」为何叫做这个名字，我一直不很理解。</p>
<p>私以为，所谓「祈愿」，你若寂寞，唤他来同乐，这是自私；你若享乐，唤他来共乐，这是无私。不管为什么，你想要见到他。</p>
<p>但最浪漫的方式是什么？平凡的一天过去了，你从学校单肩挎着书包回家，红绿灯旁偶然抬头一望，正见满眼繁星。此时你心念一动，脑海中冒出一个名字，正此时，你看见他的背影，正在人行道的对面。</p>
<p>可笑吧，最令我倾心的方式，反而最和「祈愿」和「欲望」两词搭不上边。</p>
<p>以前的人们，是否也有着这样的浪漫呢？游山赏水之时，云雾缭绕之地，恰见明月栖山，莫名欲见何人，便挥笔倾下这思绪，留给山水见证。</p>
<hr>
<p>想到稻妻城，我最喜欢的是花见坂的那棵大樱树。</p>
<p>大概三四岁的时候吧，我还住在一个小城镇里面。我家所在的那条小巷，有一块不大的空地，中间有一棵大榆树。榆树不像樱树会开花，但榆树很慈祥。时常能见到三四个孩子在树下堆积木。大一点的女孩子，会约好一起跳皮筋，或是编花篮。老爷爷喜欢把摇椅搬到树下，扇着蒲扇，唱着他们那个年代的歌谣：</p>
<p>「齐心协力做贡献…… 个个争先为人民……」</p>
<p>十几年过去了，老爷爷浑厚坚定的嗓音仍刻印在我记忆里。</p>
<p>宏帆小花园翻修之前也有一棵大树，和两侧的两排小树相映成趣，像是在护着教学楼一样。艺术节挂灯笼会挂在大树上。我站在七楼的机房朝下望，一派红色的喜庆。</p>
<p>会有学生爬上去想拿灯笼，虽然多是以老师来后的一哄而散收尾。从教室搬来的桌子、凳子等作案工具则会留在原地，引来一些不知情者的围观。</p>
<p>后来不知道为什么，小花园翻修的时候把那棵大树锄掉了。</p>
<p>花见坂的樱树…… 树下有很多小猫小狗，旁边还有很多田地。田地里的菜藤间，有一对姐弟总爱在那里交谈。烟花店好像也在树下，那个大叔还是永远听不清别人说话。我呢，喜欢去树下转一圈，到处捡掉下来的樱花。樱花好像一直掉不完，捡了那么多，还有那么多。</p>
<p>为什么我们在五千年前大榆树下是一家？因为树荫之下，是者皆为亲啊。</p>
